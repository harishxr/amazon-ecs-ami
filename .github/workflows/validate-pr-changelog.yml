name: Validate PR Changelog

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  check-changelog:
    runs-on: ubuntu-latest
    steps:
    - name: Validate changelog keywords
      env:
        PR_BODY: ${{ github.event.pull_request.body }}
        PR_AUTHOR: ${{ github.event.pull_request.user.login }}
      run: |
        # Skip validation for bot PRs (e.g., InitiateRelease via GitHub App)
        if [[ "$PR_AUTHOR" == "github-actions[bot]" || "$PR_AUTHOR" == "release-notes-testing[bot]" ]]; then
          echo "Automated release PR — skipping changelog validation"
          exit 0
        fi

        # Extract text between "Description for the changelog" and "Licensing"
        changelog=$(echo "$PR_BODY" | sed -n '/### Description for the changelog/,/### Licensing/p')

        if [ -z "$changelog" ]; then
          echo "::error::No 'Description for the changelog' section found in PR description."
          exit 1
        fi

        keywords=("feature" "enhancement" "bugfix" "housekeeping")
        found=false
        for keyword in "${keywords[@]}"; do
          if echo "$changelog" | grep -qi "\b$keyword\b"; then
            echo "Found changelog category: $keyword"
            found=true
          fi
        done

        if [ "$found" = false ]; then
          echo "::error::Changelog must contain a category keyword: feature, enhancement, bugfix, or housekeeping."
          echo "::error::Example: 'enhancement - Bump docker version to x.x.x'"
          exit 1
        fi

        echo "Changelog validation passed"
