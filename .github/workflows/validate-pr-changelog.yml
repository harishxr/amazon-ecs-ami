name: Validate PR Changelog

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  check-changelog:
    runs-on: ubuntu-latest
    steps:
    - name: Validate changelog keywords
      env:
        PR_BODY: ${{ github.event.pull_request.body }}
        PR_AUTHOR: ${{ github.event.pull_request.user.login }}
      run: |
        # Skip for bot PRs
        if [[ "$PR_AUTHOR" == "github-actions[bot]" || "$PR_AUTHOR" == "release-notes-testing[bot]" ]]; then
          echo "Bot PR — skipping changelog validation"
          exit 0
        fi

        # Extract changelog section, strip HTML comments and headers
        changelog=$(echo "$PR_BODY" | sed '/<!--/,/-->/d' | sed -n '/### Description for the changelog/,/### Licensing/p' | grep -v '^###' || true)

        if echo "$changelog" | grep -qiE '\b(feature|enhancement|bugfix|housekeeping)\b'; then
          echo "Changelog validation passed"
        else
          echo "PR description must include a changelog entry in the 'Description for the changelog' section with a category: feature, enhancement, bugfix, or housekeeping"
          echo ""
          echo "Example: 'enhancement - Bump docker version to x.x.x'"
          exit 1
        fi
