name: InitiateRelease

on:
  workflow_dispatch:

jobs:
  TestAppToken:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Generate App Token
      id: app-token
      uses: actions/create-github-app-token@v2
      with:
        app-id: ${{ secrets.APP_ID }}
        private-key: ${{ secrets.APP_PRIVATE_KEY }}

    - name: Configure Git
      run: |
        git config --global user.name "GenerateConfig Action"
        git config --global user.email "gcaction@github.com"
        git remote set-url origin https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }}

    - name: Create branch with dummy commit and push
      run: |
        branch="test-app-token-$(date '+%Y%m%d%H%M%S')"
        echo "$branch" > /tmp/branch_name
        git checkout -b $branch
        git commit --allow-empty -m "Test app token PR"
        git push --set-upstream origin $branch

    - name: Open PR
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
      run: |
        branch=$(git branch --show-current)
        gh pr create --base main --head $branch --title "Test: App Token PR $branch" --body "Automated test PR — no changelog keywords"
